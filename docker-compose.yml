services:
  app:
    build: .
    container_name: audio-learning-app
    expose:
      - "8000"
    environment:
      - ML_WS_URL=ws://178.253.39.234
      - TRANSCRIBER_BASE_URL=http://178.253.39.234
      - SUMMARY_BASE_URL=http://178.253.39.234
      - TEST_BASE_URL=http://178.253.39.234
    restart: unless-stopped
  nginx:
    image: nginx:1.27-alpine
    container_name: audio-learning-nginx
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8010}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
